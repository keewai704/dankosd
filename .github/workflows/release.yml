name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Set git defaults
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6.0.2

      - name: Derive version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >>"$GITHUB_OUTPUT"

      - name: Build Debian package
        run: VERSION='${{ steps.version.outputs.value }}' ./scripts/build-deb.sh

      - uses: actions/upload-artifact@v7.0.0
        with:
          name: deb
          path: dist/*.deb

  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Derive version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >>"$GITHUB_OUTPUT"

      - name: Install packaging dependencies
        run: pacman -Syu --noconfirm git

      - name: Set git defaults
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6.0.2

      - name: Build Arch package
        run: |
          useradd -m builder
          chown -R builder:builder "$PWD"
          su builder -c "VERSION='${{ steps.version.outputs.value }}' ./scripts/build-arch-package.sh"

      - uses: actions/upload-artifact@v7.0.0
        with:
          name: arch
          path: dist/*.pkg.tar.*

  nix:
    runs-on: ubuntu-latest
    steps:
      - name: Set git defaults
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6.0.2

      - name: Expand system uid/gid ceiling for Nix users
        run: |
          sudo sed -ri \
            -e 's/^(SYS_UID_MAX[[:space:]]+).*/\1 65535/' \
            -e 's/^(SYS_GID_MAX[[:space:]]+).*/\1 65535/' \
            /etc/login.defs

      - uses: cachix/install-nix-action@v31.10.1
      - run: nix build .#dankosd

  publish:
    runs-on: ubuntu-latest
    needs:
      - build-deb
      - build-arch
      - nix
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          path: release-artifacts

      - uses: softprops/action-gh-release@v2.5.3
        with:
          files: |
            release-artifacts/**/*.deb
            release-artifacts/**/*.pkg.tar.*
