name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >>"$GITHUB_OUTPUT"

      - name: Build Debian package
        run: VERSION='${{ steps.version.outputs.value }}' ./scripts/build-deb.sh

      - uses: actions/upload-artifact@v4
        with:
          name: deb
          path: dist/*.deb

  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Derive version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >>"$GITHUB_OUTPUT"

      - name: Install packaging dependencies
        run: pacman -Syu --noconfirm git

      - uses: actions/checkout@v4

      - name: Build Arch package
        run: |
          useradd -m builder
          chown -R builder:builder "$PWD"
          su builder -c "VERSION='${{ steps.version.outputs.value }}' ./scripts/build-arch-package.sh"

      - uses: actions/upload-artifact@v4
        with:
          name: arch
          path: dist/*.pkg.tar.*

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - run: nix build .#dankosd

  publish:
    runs-on: ubuntu-latest
    needs:
      - build-deb
      - build-arch
      - nix
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.deb
            release-artifacts/**/*.pkg.tar.*
