name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Set git defaults
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6.0.2

      - name: Validate shell scripts
        run: |
          bash -n \
            bin/dankosd \
            scripts/install.sh \
            scripts/version.sh \
            scripts/stage-system.sh \
            scripts/build-deb.sh \
            scripts/build-arch-package.sh \
            integrations/ddcfast_osd.sh

      - name: Build Debian package
        run: ./scripts/build-deb.sh

      - name: Upload Debian artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: dankosd-deb
          path: dist/*.deb

  arch-package:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Install packaging dependencies
        run: pacman -Syu --noconfirm --needed git

      - name: Set git defaults
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6.0.2

      - name: Build Arch package
        run: |
          useradd -m builder
          chown -R builder:builder "$PWD"
          su builder -c './scripts/build-arch-package.sh'

      - name: Upload Arch artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: dankosd-arch
          path: dist/*.pkg.tar.*

  nix:
    runs-on: ubuntu-latest
    steps:
      - name: Set git defaults
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6.0.2

      - name: Install Nix
        run: |
          curl -fsSL https://nixos.org/nix/install | sh -s -- --no-daemon

      - name: Build Nix package
        run: |
          . "$HOME/.nix-profile/etc/profile.d/nix.sh"
          nix --extra-experimental-features 'nix-command flakes' build .#dankosd
